services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ctpc
      POSTGRES_PASSWORD: ctpc
      POSTGRES_DB: ctpc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ctpc -d ctpc"]
      interval: 3s
      timeout: 5s
      retries: 5
