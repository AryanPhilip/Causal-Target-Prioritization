services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ctpc
      POSTGRES_USER: ctpc
      POSTGRES_PASSWORD: ctpc
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
    environment:
      CTPC_DATABASE_URL: postgresql+psycopg://ctpc:ctpc@postgres:5432/ctpc
      CTPC_SEED_ON_STARTUP: "true"
    depends_on:
      - postgres
    ports:
      - "8010:8000"

  frontend:
    build:
      context: ../frontend
    environment:
      CTPC_API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3100:3000"

volumes:
  postgres-data:
